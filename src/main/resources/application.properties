server.port=8081

# Serve the Vite production build (frontend/dist) as static resources under /.
# Path is relative to the working dir when running `mvn spring-boot:run` from the
# project root. Run `npm run build` first so frontend/dist exists.
# NOTE: SecurityConfig currently authenticates anyRequest() except a few file
# patterns, so to serve the SPA shell + hashed /assets/** through Spring you must
# also permit "/", "/index.html", and "/assets/**" there (see the migration notes).
spring.web.resources.static-locations=file:./frontend/dist/,classpath:/static/

# Secrets come from the environment — see .env.example. The app fails fast at
# startup ("Could not resolve placeholder ...") if a variable is missing.
spring.datasource.url=jdbc:postgresql://ep-steep-brook-aoaf38ce-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
# Default session token lifetime: 12h. rememberMe=true overrides to 30 days
# (see JwtUtil). Tokens carry a jti and can be revoked before expiry (logout).
jwt.expiry-ms=43200000

cors.allowed-origins=http://localhost:3000,http://localhost:55067,http://127.0.0.1:3000,http://127.0.0.1:55067

# Secure attribute on the inkly_token cookie. false for plain-HTTP local dev;
# the prod profile turns it on (HTTPS only).
app.security.cookie-secure=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Kanban WIP enforcement: false = warn only, true = block the move
inkly.kanban.wip.strict=false

# Google OAuth 2.0 credentials (from Google Cloud Console)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
google.oauth.redirect-uri=http://localhost:8081/api/calendar/oauth/callback

# AES-256 key for encrypting stored refresh tokens (base64, exactly 32 bytes)
# Generate with: openssl rand -base64 32
calendar.token.encryption-key=${CALENDAR_TOKEN_ENCRYPTION_KEY}

# How far back to pull on first Google sync (days)
calendar.sync.initial-lookback-days=30

# Scheduled sync interval in milliseconds (default 5 minutes)
calendar.sync.interval-ms=300000

# Where to send the browser after a successful Google OAuth callback
calendar.oauth.success-redirect=http://localhost:3000/#/calendar?connected=true
