# =====================================================================
# Production profile (SPRING_PROFILES_ACTIVE=prod).
# No localhost values here — every host-specific setting comes from the
# environment. Missing variables fail fast at startup.
# =====================================================================

# Never echo SQL (noise + data leak) in production logs.
spring.jpa.show-sql=false

# The JWT cookie must only travel over HTTPS.
app.security.cookie-secure=true

# Comma-separated list of allowed browser origins, e.g.
# https://app.example.com,https://www.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Public HTTPS callback registered in Google Cloud Console, e.g.
# https://app.example.com/api/calendar/oauth/callback
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}

# Where the browser lands after a successful Google OAuth callback, e.g.
# https://app.example.com/#/calendar?connected=true
calendar.oauth.success-redirect=${CALENDAR_OAUTH_SUCCESS_REDIRECT}
